name: Refresh timetables

# Daily + manual. Runs unattended:
#   - Studios that pull cleanly are committed straight to main (Netlify publishes).
#   - Studios that fail keep their last-good data (never wiped).
#   - Anything needing a human (a feed down, an unknown teacher/studio) raises a
#     GitHub issue — it does NOT block the studios that worked.
on:
  schedule:
    - cron: "0 19 * * *"   # Daily 19:00 UTC ≈ 5:00 AM Melbourne (AEST) / 6:00 AM (AEDT)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Pull + rebuild
        run: python pull/pull.py

      - name: Publish clean schedule changes
        run: |
          git config user.name  "yim-timetable-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/schedule.json *.html pull/_feed_state.json
          if git diff --cached --quiet; then
            echo "No timetable changes to publish."
          else
            git commit -m "Auto-refresh teacher timetables from studio feeds"
            git push
            echo "Published timetable changes to main."
          fi

      - name: Raise issue on anomalies
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s pull/_anomalies.md ]; then
            echo "No anomalies."
            exit 0
          fi
          TITLE="⚠ Timetable pull needs attention"
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body-file pull/_anomalies.md
            echo "Appended to existing issue #$NUM."
          else
            gh issue create --title "$TITLE" --body-file pull/_anomalies.md
            echo "Opened a new issue."
          fi
