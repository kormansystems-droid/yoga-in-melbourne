name: Refresh timetables

# Daily + manual. Runs unattended:
#   - Studios that pull cleanly are committed straight to main (Netlify publishes).
#   - Studios that fail keep their last-good data (never wiped).
#   - Anything needing a human (a feed down N runs, a profiled teacher dropped) raises
#     a GitHub issue — it does NOT block the studios that worked.
on:
  schedule:
    - cron: "0 19 * * *"   # Daily 19:00 UTC ≈ 5:00 AM Melbourne (AEST) / 6:00 AM (AEDT)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so the rebase-before-push works cleanly

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Pull + rebuild
        run: python pull/pull.py

      - name: Publish clean schedule changes
        run: |
          git config user.name  "yim-timetable-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/schedule.json *.html pull/_feed_state.json
          if git diff --cached --quiet; then
            echo "No timetable changes to publish."
            exit 0
          fi
          git commit -m "Auto-refresh teacher timetables from studio feeds"
          # main may have moved (a concurrent commit, or a re-run on an older sha).
          # Rebase onto the latest and retry rather than failing the whole run.
          BR="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin "$BR" || true
            if git push origin "HEAD:$BR"; then
              echo "Published (attempt $attempt)."
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing and retrying..."
            sleep 3
          done
          echo "Could not push after 3 attempts."
          exit 1

      - name: Raise issue on anomalies
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s pull/_anomalies.md ]; then
            echo "No anomalies."
            exit 0
          fi
          TITLE="⚠ Timetable pull needs attention"
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body-file pull/_anomalies.md
            echo "Appended to existing issue #$NUM."
          else
            gh issue create --title "$TITLE" --body-file pull/_anomalies.md
            echo "Opened a new issue."
          fi
