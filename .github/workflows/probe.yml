name: Probe go.mindbody (headless/datacenter test)
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Run probe
        run: python probe_gomindbody.py
